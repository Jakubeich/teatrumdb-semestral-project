name: teatrumdb

services:
  oracle:
    image: gvenzl/oracle-free:23.26.1-slim-faststart
    container_name: teatrumdb-oracle
    restart: unless-stopped
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      APP_USER: ${APP_USER}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD}
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./sql:/workspace/sql:ro
      - ./docker/init:/container-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  oracle-data:
